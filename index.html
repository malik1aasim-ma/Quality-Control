<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quality Inspection Log (AQL 2.5)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pdf-content">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <div class="bg-white rounded-xl shadow-xs p-6 mb-6 border border-slate-200 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                Daily Quality Inspection Log (AQL 2.5)
            </h1>
            <div id="userInfo" class="text-xs text-slate-500 font-medium"></div>
        </div>

        <form id="qualityForm" class="bg-white rounded-xl shadow-xs p-6 mb-6 border border-slate-200 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Date</label>
                    <input type="date" id="reportDate" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Unit Name / Line ID</label>
                    <input type="text" id="lineId" required placeholder="e.g. Line 04" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">SO #</label>
                    <input type="text" id="soNum" required placeholder="e.g. 11279" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Color</label>
                    <input type="text" id="color" required placeholder="e.g. Black" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-blue-700 mb-1">Daily Output Qty</label>
                    <input type="number" id="outputQty" required placeholder="Enter total pieces" class="w-full bg-white rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-blue-700 mb-1">Qty Inspected (Sample Size)</label>
                    <input type="number" id="inspectedQty" readonly class="w-full bg-slate-200 rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-600 focus:outline-hidden">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-rose-700 mb-1">Manual DHU Entry (%)</label>
                    <input type="text" id="dhuPercent" readonly class="w-full bg-slate-200 rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-600 focus:outline-hidden">
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-lg px-4 py-2.5 text-xs text-blue-800 font-medium">
                System Standard AQL 2.5 Max Allowed Limits: &nbsp; 
                <span class="font-bold text-blue-900">Major Max: <span id="maxMajor">0</span></span> &nbsp;|&nbsp; 
                <span class="font-bold text-blue-900">Minor Max: <span id="maxMinor">0</span></span> &nbsp;|&nbsp; 
                <span class="font-bold text-rose-700">Critical Max: <span id="maxCritical">0</span></span>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-amber-50/50 border border-amber-200 rounded-xl p-4 space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-amber-800">Major Defects Found</label>
                    <input type="number" id="majorCount" value="0" min="0" class="w-full bg-white rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-800">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">📸 Major Photo Proof</label>
                        <input type="file" id="majorFile" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-800 hover:file:bg-amber-200">
                    </div>
                </div>

                <div class="bg-amber-50/50 border border-amber-200 rounded-xl p-4 space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-amber-800">Minor Defects Found</label>
                    <input type="number" id="minorCount" value="0" min="0" class="w-full bg-white rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-800">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">📸 Minor Photo Proof</label>
                        <input type="file" id="minorFile" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-800 hover:file:bg-amber-200">
                    </div>
                </div>

                <div class="bg-rose-50/50 border border-rose-200 rounded-xl p-4 space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-rose-800">Critical Defects Found</label>
                    <input type="number" id="criticalCount" value="0" min="0" class="w-full bg-white rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-800">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">📸 Critical Photo Proof</label>
                        <input type="file" id="criticalFile" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-rose-100 file:text-rose-800 hover:file:bg-rose-200">
                    </div>
                </div>

                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-700">Un-trimmed Threads Found</label>
                    <input type="number" id="threadCount" value="0" min="0" class="w-full bg-white rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-800">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">📸 Thread Photo Proof</label>
                        <input type="file" id="threadFile" accept="image/*" class="w-full text-xs file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-slate-200 file:text-slate-700 hover:file:bg-slate-300">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">QC Alphanumeric Remarks</label>
                <textarea id="remarks" rows="2" placeholder="Describe layout observation notes..." class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-hidden focus:ring-2 focus:ring-emerald-500"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-3 px-4 rounded-xl shadow-sm transition-colors text-sm cursor-pointer flex items-center justify-center gap-2">
                Save Daily Quality Report
            </button>
        </form>

        <div class="bg-white rounded-xl shadow-xs border border-slate-200 p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    📋 Submitted Quality Reports Log
                </h2>
                <button onclick="fetchReports()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-lg border border-slate-300 transition-colors cursor-pointer">
                    🔄 Refresh Log
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 uppercase tracking-wider text-[11px] font-semibold border-b border-slate-200">
                            <th class="p-3">Date</th>
                            <th class="p-3">Line ID</th>
                            <th class="p-3">SO #</th>
                            <th class="p-3">Color</th>
                            <th class="p-3 text-right">Output</th>
                            <th class="p-3 text-right">DHU %</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="reportLogBody" class="divide-y divide-slate-100 text-slate-700">
                        <tr>
                            <td colspan="7" class="p-4 text-center text-slate-400 text-xs">Loading reports...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="reportModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900/40 backdrop-blur-xs"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-2xl mx-auto rounded-xl shadow-xl z-50 overflow-y-auto max-h-[90vh]">
            <div class="p-6 space-y-6">
                <div class="flex justify-between items-center pb-3 border-b border-slate-100">
                    <h3 class="text-xl font-bold text-slate-900">Detailed Inspection Quality Report</h3>
                    <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-bold cursor-pointer">&times;</button>
                </div>
                
                <div id="modalContent" class="space-y-4 text-sm">
                    </div>

                <div class="flex justify-end pt-2">
                    <button onclick="toggleModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-4 py-2 rounded-lg text-xs cursor-pointer border border-slate-200">
                        Close Report
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION: Live project URL and API keys loaded successfully
        const SUPABASE_URL = "https://qjmbmritdbqtkitxaayu.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_CtGzYhf4dI-QKgTO5Y9v7A_97GIWNW4";

        let supabase;

        // Initialize Supabase and check session handler securely
        function initSupabase() {
            supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const session = localStorage.getItem('user_session') || sessionStorage.getItem('user_session');
            if (session) {
                try {
                    const user = JSON.parse(session);
                    document.getElementById('userInfo').innerText = `Inspector: ${user.name || 'Active QC'}`;
                } catch(e) { console.error(e); }
            }
        }

        // Auto Setup Date Field to Current Date
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        // AQL 2.5 Calculations
        const getSampleSizeAndLimits = (output) => {
            if (output <= 0) return { size: 0, major: 0, minor: 0, critical: 0 };
            if (output <= 8) return { size: 2, major: 0, minor: 0, critical: 0 };
            if (output <= 15) return { size: 3, major: 0, minor: 0, critical: 0 };
            if (output <= 25) return { size: 5, major: 0, minor: 0, critical: 0 };
            if (output <= 50) return { size: 8, major: 0, minor: 0, critical: 0 };
            if (output <= 90) return { size: 13, major: 1, minor: 1, critical: 0 };
            if (output <= 150) return { size: 20, major: 1, minor: 1, critical: 0 };
            if (output <= 280) return { size: 32, major: 2, minor: 2, critical: 0 };
            if (output <= 500) return { size: 50, major: 3, minor: 3, critical: 0 };
            if (output <= 1200) return { size: 80, major: 5, minor: 5, critical: 0 };
            if (output <= 3200) return { size: 125, major: 7, minor: 7, critical: 1 };
            if (output <= 10000) return { size: 200, major: 10, minor: 10, critical: 1 };
            return { size: 315, major: 14, minor: 14, critical: 2 };
        };

        const outputInput = document.getElementById('outputQty');
        const majorInput = document.getElementById('majorCount');
        const minorInput = document.getElementById('minorCount');
        const criticalInput = document.getElementById('criticalCount');
        const threadInput = document.getElementById('threadCount');

        function recalculateMetrics() {
            const output = parseInt(outputInput.value) || 0;
            const metrics = getSampleSizeAndLimits(output);
            
            document.getElementById('inspectedQty').value = metrics.size;
            document.getElementById('maxMajor').innerText = metrics.major;
            document.getElementById('maxMinor').innerText = metrics.minor;
            document.getElementById('maxCritical').innerText = metrics.critical;

            const totalDefects = (parseInt(majorInput.value) || 0) + (parseInt(minorInput.value) || 0) + (parseInt(criticalInput.value) || 0) + (parseInt(threadInput.value) || 0);
            const dhu = metrics.size > 0 ? ((totalDefects / metrics.size) * 100).toFixed(2) : "0.00";
            document.getElementById('dhuPercent').value = dhu + "%";
        }

        [outputInput, majorInput, minorInput, criticalInput, threadInput].forEach(el => el.addEventListener('input', recalculateMetrics));

        // Upload Image Helper function
        async function uploadImageFile(fileInputId, folderName) {
            const fileInput = document.getElementById(fileInputId);
            if (!fileInput || fileInput.files.length === 0) return null;
            
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${folderName}_${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
            const filePath = `${fileName}`;

            const { data, error } = await supabase.storage
                .from('quality_proofs')
                .upload(filePath, file);

            if (error) {
                console.error("Storage upload error:", error);
                return null;
            }

            const { data: publicUrlData } = supabase.storage
                .from('quality_proofs')
                .getPublicUrl(filePath);

            return publicUrlData.publicUrl;
        }

        // Form Submission Logic
        document.getElementById('qualityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing & Uploading Proofs...";

            try {
                // 1. Upload images if they exist
                const majorUrl = await uploadImageFile('majorFile', 'major');
                const minorUrl = await uploadImageFile('minorFile', 'minor');
                const criticalUrl = await uploadImageFile('criticalFile', 'critical');
                const threadUrl = await uploadImageFile('threadFile', 'thread');

                // 2. Submit record metadata to DB table
                const reportPayload = {
                    report_date: document.getElementById('reportDate').value,
                    line_id: document.getElementById('lineId').value,
                    so_number: document.getElementById('soNum').value,
                    color: document.getElementById('color').value,
                    daily_output_qty: parseInt(outputInput.value) || 0,
                    qty_inspected: parseInt(document.getElementById('inspectedQty').value) || 0,
                    major_defects: parseInt(majorInput.value) || 0,
                    minor_defects: parseInt(minorInput.value) || 0,
                    critical_defects: parseInt(criticalInput.value) || 0,
                    untrimmed_threads: parseInt(threadInput.value) || 0,
                    dhu_percentage: parseFloat(document.getElementById('dhuPercent').value) || 0,
                    remarks: document.getElementById('remarks').value,
                    major_photo_url: majorUrl,
                    minor_photo_url: minorUrl,
                    critical_photo_url: criticalUrl,
                    thread_photo_url: threadUrl
                };

                const { error } = await supabase.from('daily_quality_reports').insert([reportPayload]);

                if (error) throw error;

                alert("Inspection quality report and proof images saved successfully to Supabase!");
                document.getElementById('qualityForm').reset();
                document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
                recalculateMetrics();
                fetchReports();
            } catch (err) {
                alert("Database Submission Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Save Daily Quality Report";
            }
        });

        // Load and Fetch Logs
        async function fetchReports() {
            const body = document.getElementById('reportLogBody');
            if (!body) return;
            body.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-xs text-slate-400">Fetching latest log records...</td></tr>`;

            const { data, error } = await supabase
                .from('daily_quality_reports')
                .select('*')
                .order('report_date', { ascending: false });

            if (error) {
                body.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-xs text-rose-500">Failed to load logs: ${error.message}</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                body.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-xs text-slate-400">No inspection reports recorded yet.</td></tr>`;
                return;
            }

            body.innerHTML = "";
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-100";
                tr.innerHTML = `
                    <td class="p-3 font-medium text-slate-900">${row.report_date}</td>
                    <td class="p-3">${row.line_id}</td>
                    <td class="p-3">${row.so_number}</td>
                    <td class="p-3">${row.color}</td>
                    <td class="p-3 text-right">${row.daily_output_qty}</td>
                    <td class="p-3 text-right font-bold text-slate-900">${row.dhu_percentage}%</td>
                    <td class="p-3 text-center">
                        <button onclick='viewReportDetails(${JSON.stringify(row)})' class="bg-emerald-50 text-emerald-700 hover:bg-emerald-100 font-semibold px-2.5 py-1 rounded-md text-xs cursor-pointer border border-emerald-200">
                            View Report
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        // Modal View Displaying Live Saved Photos
        function viewReportDetails(row) {
            const content = document.getElementById('modalContent');
            
            // Build out proof images preview safely
            const imageSection = (title, url) => {
                if (!url) return `<div class="bg-slate-50 p-3 rounded-lg text-center text-xs text-slate-400 border border-dashed border-slate-200">No photo uploaded for ${title}</div>`;
                return `
                    <div class="bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <span class="block text-[11px] font-bold text-slate-500 mb-1 uppercase">${title} Photo Proof</span>
                        <a href="${url}" target="_blank" title="Click to view full image">
                            <img src="${url}" class="w-full h-32 object-cover rounded-md border border-slate-300 hover:scale-[1.02] transition-transform cursor-zoom-in">
                        </a>
                    </div>
                `;
            };

            content.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <div><span class="text-xs text-slate-400 block font-semibold uppercase">Date</span><strong>${row.report_date}</strong></div>
                    <div><span class="text-xs text-slate-400 block font-semibold uppercase">Line ID</span><strong>${row.line_id}</strong></div>
                    <div><span class="text-xs text-slate-400 block font-semibold uppercase">SO #</span><strong>${row.so_number}</strong></div>
                    <div><span class="text-xs text-slate-400 block font-semibold uppercase">Color</span><strong>${row.color}</strong></div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 text-center py-2">
                    <div class="p-2 border border-slate-100 rounded-lg"><span class="text-xs text-slate-400 block">Output Qty</span><span class="text-base font-bold">${row.daily_output_qty}</span></div>
                    <div class="p-2 border border-slate-100 rounded-lg"><span class="text-xs text-slate-400 block">Inspected Size</span><span class="text-base font-bold">${row.qty_inspected}</span></div>
                    <div class="p-2 border bg-emerald-50 border-emerald-200 text-emerald-800 rounded-lg"><span class="text-xs text-emerald-600 block">Final DHU</span><span class="text-base font-extrabold">${row.dhu_percentage}%</span></div>
                </div>

                <div class="border-t border-slate-100 pt-3">
                    <span class="block text-xs font-bold text-slate-500 uppercase mb-2">Defect Quantities Found:</span>
                    <div class="grid grid-cols-4 gap-2 text-center text-xs">
                        <div class="bg-amber-50 p-2 rounded-lg border border-amber-100"><strong>Major:</strong> ${row.major_defects}</div>
                        <div class="bg-amber-50 p-2 rounded-lg border border-amber-100"><strong>Minor:</strong> ${row.minor_defects}</div>
                        <div class="bg-rose-50 p-2 rounded-lg border border-rose-100 text-rose-800"><strong>Critical:</strong> ${row.critical_defects}</div>
                        <div class="bg-slate-100 p-2 rounded-lg"><strong>Threads:</strong> ${row.untrimmed_threads}</div>
                    </div>
                </div>

                <div class="border-t border-slate-100 pt-3">
                    <span class="block text-xs font-bold text-slate-500 uppercase mb-2">Live Floor Inspection Photos:</span>
                    <div class="grid grid-cols-2 gap-3">
                        ${imageSection('Major Defects', row.major_photo_url)}
                        ${imageSection('Minor Defects', row.minor_photo_url)}
                        ${imageSection('Critical Defects', row.critical_photo_url)}
                        ${imageSection('Threads', row.thread_photo_url)}
                    </div>
                </div>

                <div class="border-t border-slate-100 pt-3">
                    <span class="block text-xs font-bold text-slate-500 uppercase mb-1">QC Alphanumeric Remarks:</span>
                    <div class="p-3 bg-slate-50 rounded-lg text-xs italic text-slate-600 border border-slate-200">
                        ${row.remarks || "No supplementary remarks submitted."}
                    </div>
                </div>
            `;
            toggleModal();
        }

        function toggleModal() {
            const body = document.querySelector('body');
            const modal = document.getElementById('reportModal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            body.classList.toggle('modal-active');
        }

        // Initial Load on Page Startup
        window.onload = function() {
            initSupabase();
            fetchReports();
        };
    </script>
</body>
</html>
